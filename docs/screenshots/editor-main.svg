<svg xmlns="http://www.w3.org/2000/svg" width="913" height="610" viewBox="0 0 913 610" role="img" aria-labelledby="title desc">
  <title id="title">CLEO Lua Editor desktop window</title>
  <desc id="desc">Screenshot-style preview of the GTK WebKit CLEO Lua Editor with a Lua script in Ace Editor and opcode dictionary panels on the right.</desc>
  <defs>
    <linearGradient id="titlebar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#4a4d52"/>
      <stop offset="1" stop-color="#303238"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="913" height="610" fill="#0f1116"/>
  <g filter="url(#shadow)">
    <rect x="1" y="1" width="911" height="608" rx="3" fill="#1d2129" stroke="#535861"/>
    <rect x="2" y="2" width="909" height="30" fill="url(#titlebar)"/>
    <rect x="7" y="9" width="18" height="13" fill="#dfe8f6" stroke="#91a3b8"/>
    <text x="456" y="21" fill="#c6c8cc" font-family="DejaVu Sans, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">CLEO Lua Editor</text>
    <text x="825" y="21" fill="#c6c8cc" font-family="DejaVu Sans, Arial, sans-serif" font-size="15">⌃  −  □  ×</text>

    <rect x="2" y="32" width="909" height="39" fill="#20252f"/>
    <text x="12" y="56" fill="#f0f3f8" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" font-weight="700">CLEO Lua Editor</text>
    <g font-family="DejaVu Sans, Arial, sans-serif" font-size="9" font-weight="700">
      <rect x="137" y="41" width="31" height="20" rx="3" fill="#2b313d" stroke="#4f5869"/><text x="152" y="54" fill="#fff" text-anchor="middle">New</text>
      <rect x="176" y="41" width="54" height="20" rx="3" fill="#2b313d" stroke="#4f5869"/><text x="203" y="54" fill="#fff" text-anchor="middle">Open .lua</text>
      <rect x="239" y="41" width="45" height="20" rx="3" fill="#2b313d" stroke="#4f5869"/><text x="262" y="54" fill="#fff" text-anchor="middle">Save .lua</text>
      <rect x="291" y="41" width="70" height="20" rx="3" fill="#2b313d" stroke="#4f5869"/><text x="326" y="54" fill="#fff" text-anchor="middle">Export Project</text>
      <rect x="369" y="41" width="98" height="20" rx="3" fill="#2b313d" stroke="#4f5869"/><text x="418" y="54" fill="#fff" text-anchor="middle">Load opcodes.dict</text>
      <rect x="475" y="41" width="64" height="20" rx="3" fill="#2b313d" stroke="#4f5869"/><text x="507" y="54" fill="#fff" text-anchor="middle">Check Names</text>
      <rect x="547" y="41" width="83" height="20" rx="3" fill="#2b313d" stroke="#4f5869"/><text x="589" y="54" fill="#fff" text-anchor="middle">Insert Template</text>
      <rect x="638" y="41" width="86" height="20" rx="3" fill="#2b313d" stroke="#4f5869"/><text x="681" y="54" fill="#fff" text-anchor="middle">Test Backend</text>
      <rect x="799" y="36" width="74" height="30" rx="4" fill="#2b313d" stroke="#4f5869"/><text x="834" y="55" fill="#fff" text-anchor="middle">Monokai</text>
      <rect x="881" y="41" width="21" height="20" rx="10" fill="#2b313d" stroke="#4f5869"/><text x="891" y="56" fill="#f5d36b" text-anchor="middle" font-size="14">◔</text>
    </g>

    <rect x="3" y="72" width="566" height="513" fill="#262a23"/>
    <rect x="58" y="72" width="1" height="513" fill="#50584d"/>
    <g font-family="DejaVu Sans Mono, Consolas, monospace" font-size="15">
      <g fill="#8a8f86" text-anchor="end">
        <text x="41" y="88">1</text><text x="41" y="126">2</text><text x="41" y="164">3</text><text x="41" y="202">4</text><text x="41" y="240">5</text><text x="41" y="278">6</text><text x="41" y="316">7</text><text x="41" y="354">8</text><text x="41" y="392">9</text><text x="41" y="430">10</text><text x="41" y="468">11</text><text x="41" y="506">12</text><text x="41" y="544">13</text>
      </g>
      <text x="60" y="87" fill="#777365">-- Compile-time Lua frontend example for the existing CLEO</text>
      <text x="90" y="107" fill="#777365">compiler backend.</text>
      <text x="60" y="126" fill="#777365">-- Usage: python compiler_with_lua.py teleport_example.lua</text>
      <text x="90" y="145" fill="#777365">opcodes.dict.txt</text>
      <text x="60" y="183" fill="#f0f3f8">thread(<tspan fill="#f4d35e">'SCRIPT'</tspan>)</text>
      <text x="60" y="222" fill="#f0f3f8">label(<tspan fill="#f4d35e">'loop'</tspan>)</text>
      <text x="60" y="241" fill="#f0f3f8">wait(<tspan fill="#c792ea">0</tspan>)</text>
      <text x="60" y="279" fill="#777365">-- if gate active, count down</text>
      <text x="60" y="298" fill="#f0f3f8">IF(<tspan fill="#c792ea">1</tspan>)</text>
      <text x="60" y="317" fill="#f0f3f8">gt(V(<tspan fill="#c792ea">2</tspan>), <tspan fill="#c792ea">0</tspan>)</text>
      <text x="90" y="336" fill="#f0f3f8">goto_false(<tspan fill="#f4d35e">'check_keys'</tspan>)</text>
      <text x="60" y="374" fill="#f0f3f8">dec(V(<tspan fill="#c792ea">2</tspan>), <tspan fill="#c792ea">1</tspan>)</text>
      <text x="60" y="393" fill="#f0f3f8">jmp(<tspan fill="#f4d35e">'loop'</tspan>)</text>
      <text x="60" y="431" fill="#f0f3f8">label(<tspan fill="#f4d35e">'check_keys'</tspan>)</text>
      <text x="60" y="469" fill="#777365">-- if L+Left: save position</text>
      <text x="60" y="488" fill="#f0f3f8">IF(<tspan fill="#c792ea">1</tspan>)</text>
      <text x="60" y="507" fill="#f0f3f8">IS_BUTTON_PRESSED(<tspan fill="#c792ea">0</tspan>, <tspan fill="#c792ea">4</tspan>)</text>
      <text x="60" y="526" fill="#f0f3f8">goto_false(<tspan fill="#f4d35e">'s8'</tspan>)</text>
    </g>

    <rect x="570" y="72" width="340" height="513" fill="#1f2430" stroke="#465066"/>
    <g font-family="DejaVu Sans Mono, Consolas, monospace" font-size="10">
      <text x="578" y="86" fill="#ffffff" font-family="DejaVu Sans, Arial, sans-serif" font-size="11" font-weight="700">Autocomplete vocabulary</text>
      <text x="578" y="101" fill="#cfd6e6" font-size="9">Suggestions combine Lua helpers plus whatever opcode dictionary is loaded.</text>
      <g fill="#e8edf7" font-size="9">
        <rect x="578" y="122" width="36" height="17" rx="8" fill="#2a3040" stroke="#566176"/><text x="596" y="134" text-anchor="middle">thread</text>
        <rect x="619" y="122" width="30" height="17" rx="8" fill="#2a3040" stroke="#566176"/><text x="634" y="134" text-anchor="middle">label</text>
        <rect x="654" y="122" width="50" height="17" rx="8" fill="#2a3040" stroke="#566176"/><text x="679" y="134" text-anchor="middle">goto_false</text>
        <rect x="709" y="122" width="32" height="17" rx="8" fill="#2a3040" stroke="#566176"/><text x="725" y="134" text-anchor="middle">gosub</text>
        <rect x="746" y="122" width="22" height="17" rx="8" fill="#2a3040" stroke="#566176"/><text x="757" y="134" text-anchor="middle">ret</text>
        <rect x="773" y="122" width="28" height="17" rx="8" fill="#2a3040" stroke="#566176"/><text x="787" y="134" text-anchor="middle">wait</text>
        <rect x="806" y="122" width="18" height="17" rx="8" fill="#2a3040" stroke="#566176"/><text x="815" y="134" text-anchor="middle">V</text>
      </g>
      <line x1="570" y1="166" x2="910" y2="166" stroke="#465066"/>
      <text x="578" y="182" fill="#ffffff" font-family="DejaVu Sans, Arial, sans-serif" font-size="11" font-weight="700">Dictionary</text>
      <text x="578" y="197" fill="#f0f3f8">Loaded 1010 opcodes.</text>
      <text x="578" y="216" fill="#f0f3f8">IF</text><text x="760" y="216" fill="#f0f3f8">00DB  1 params</text>
      <text x="578" y="230" fill="#f0f3f8">NOT</text><text x="760" y="230" fill="#f0f3f8">825B  1 params</text>
      <text x="578" y="244" fill="#f0f3f8">SET_MUTEX_VAR</text><text x="760" y="244" fill="#f0f3f8">0DDC  2 params</text>
      <text x="578" y="258" fill="#f0f3f8">GET_MUTEX_VAR</text><text x="760" y="258" fill="#f0f3f8">0DDD  2 params</text>
      <text x="578" y="272" fill="#f0f3f8">CREATE_MENU</text><text x="760" y="272" fill="#f0f3f8">0D05  5 params</text>
      <text x="578" y="286" fill="#f0f3f8">GET_MENU_ACTIVE_ITEM</text><text x="760" y="286" fill="#f0f3f8">0DF5  1 params</text>
      <text x="578" y="300" fill="#f0f3f8">DELETE_MENU</text><text x="760" y="300" fill="#f0f3f8">0DF3  0 params</text>
      <text x="578" y="314" fill="#f0f3f8">CREATE_CAR</text><text x="760" y="314" fill="#f0f3f8">00A5  5 params</text>
      <text x="578" y="328" fill="#f0f3f8">LAUNCH_MISSION</text><text x="760" y="328" fill="#f0f3f8">00DC  1 params</text>
      <line x1="570" y1="376" x2="910" y2="376" stroke="#465066"/>
      <text x="578" y="391" fill="#ffffff" font-family="DejaVu Sans, Arial, sans-serif" font-size="11" font-weight="700">Lightweight checks</text>
      <text x="578" y="406" fill="#f0f3f8">Click "Check Names" to scan uppercase calls and OP("...") names</text>
      <text x="578" y="420" fill="#f0f3f8">against the loaded dictionary.</text>
    </g>
    <rect x="3" y="586" width="907" height="22" fill="#20252f"/>
    <text x="12" y="601" fill="#74e58d" font-family="DejaVu Sans Mono, Consolas, monospace" font-size="10">GTK/WebKit wrapper connected</text>
    <text x="740" y="601" fill="#bdc7d8" font-family="DejaVu Sans Mono, Consolas, monospace" font-size="10">Ln 1, Col 1   1010 opcodes   autosave idle</text>
  </g>
</svg>
